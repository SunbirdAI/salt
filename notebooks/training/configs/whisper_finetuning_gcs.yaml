pretrained_model: openai/whisper-large-v3
mlflow_experiment_name: stt-whisper
use_peft: false
lora_config:
  r: 32
  lora_alpha: 64
  target_modules:
  - q_proj
  - v_proj
  lora_dropout: 0.05
  bias: none
training_args:
  output_dir: whisper-large-v3-multilingual
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-05
  warmup_steps: 500
  max_steps: 8000
  # num_train_epochs: 2
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: true
  fp16: false
  bf16: true
  eval_strategy: steps
  predict_with_generate: true
  generation_max_length: 200
  generation_num_beams: 1
  save_steps: 1000
  eval_steps: 1000
  logging_steps: 50
  load_best_model_at_end: true
  metric_for_best_model: loss
  greater_is_better: false
  push_to_hub: true
  hub_model_id: huwenjie333/whisper-large-v3-salt-2-gcloud
  save_total_limit: 2
train:
  download_datasets_in_parallel: true
  gcs_key_path: gcs-data-viewer-key.json
