      wol, xho, xog, yor, zul]
    preprocessing:
    # Downsample some examples to 8KHz (to simulate phone audio) 
    - set_sample_rate:
        rate: 8_000
        p: 0.2
    # Then upsample again
    - set_sample_rate:
        rate: 16_000
    - normalize_audio
    - augment_audio_speed:
        p: 0.2
        low: 0.95
        high: 1.15
    - augment_audio_noise:
        max_relative_amplitude: 0.5
